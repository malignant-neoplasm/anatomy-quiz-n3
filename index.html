<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Anatomy Quiz</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f7f7f7;
}

/* ===== 上部UI ===== */
.controls {
  position: sticky;
  top: 0;
  background: #fff;
  padding: 10px;
  display: flex;
  gap: 10px;
  justify-content: center;
  border-bottom: 1px solid #ddd;
  z-index: 10;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #1976d2;
  color: white;
  cursor: pointer;
  font-size: 0.85em;
}
button:hover {
  background: #1565c0;
}

/* ===== クイズ ===== */
.quiz {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

.item {
  width: calc(50% - 5px);
  background: #fffafa;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 10px;

  display: flex;
  align-items: center;
}

/* 問題 */
.q {
  flex: 1;
  font-weight: bold;
  font-size: 0.85em;
}

/* 黒枠 */
.a {
  width: 220px;
  text-align: center;
  background: #444;
  color: #444;
  border-radius: 4px;
  padding: 6px 0;
  cursor: pointer;
  margin: 0 8px;
  transition: 0.2s;
  white-space: nowrap;
  overflow: hidden;
}
.a.show {
  background: #fff9c4;
  color: #d32f2f;
}

/* 読み上げボタン */
.speak-btn {
  background: #4caf50;
  padding: 6px 8px;
  font-size: 0.8em;
}
.speak-btn:hover {
  background: #388e3c;
}

@media (max-width: 600px) {
  .item { width: 100%; }
  .a { width: 180px; }
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="toggleMode()">日⇄英 切替</button>
  <button onclick="shuffle()">シャッフル</button>
  <button onclick="resetOrder()">リセット</button>
</div>

<div id="quiz" class="quiz"></div>

<script>
let mode = "enToJp";

const originalData = [
["brain / encephalon","脳"],
["cerebrum","大脳"],
["cerebellum","小脳"],
["brainstem","脳幹"],
["midbrain / mesencephalon","中脳"],
["pons","橋"],
["medulla oblongata","延髄"],
["diencephalon","間脳"],
["thalamus","視床"],
["hypothalamus","視床下部"],
["pineal gland","松果体"],
["pituitary gland","下垂体"],
["hippocampus","海馬"],
["spinal cord","脊髄"],
["meninx (pl. meninges)","髄膜"],

["eyeball","眼球"],
["conjunctiva","結膜"],
["cornea","角膜"],
["iris","虹彩"],
["crystalline lens","水晶体"],
["retina","網膜"],
["vitreous body","硝子体"],
["uvea","ぶどう膜"],
["sclera","強膜"],

["auricle","耳介"],
["external ear","外耳"],
["middle ear","中耳"],
["internal ear","内耳"],
["external auditory canal","外耳道"],
["eardrum / tympanic membrane","鼓膜"],
["Eustachian tube","耳管"],

["cochlea","蝸牛"],
["semicircular canals","半規管"],

["heart","心臓"],
["left atrium","左心房"],
["left ventricle","左心室"],
["right atrium","右心房"],
["right ventricle","右心室"],
["tricuspid valve","三尖弁"],
["mitral valve","僧帽弁"],
["aortic valve","大動脈弁"],
["aortic arch","大動脈弓"],
["aorta","大動脈"],
["pulmonary artery","肺動脈"],
["pulmonary vein","肺静脈"],
["coronary artery","冠動脈"],
["superior vena cava","上大静脈"],
["inferior vena cava","下大静脈"]
];

let data = [...originalData];

function render() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  data.forEach(d => {
    const item = document.createElement("div");
    item.className = "item";

    const q = document.createElement("div");
    q.className = "q";

    const a = document.createElement("div");
    a.className = "a";

    const speakBtn = document.createElement("button");
    speakBtn.className = "speak-btn";
    speakBtn.textContent = "🔊";

    if (mode === "enToJp") {
      q.textContent = d[0];
      a.textContent = d[1];
      speakBtn.onclick = () => speak(d[0], "en-US");
    } else {
      q.textContent = d[1];
      a.textContent = d[0];
      speakBtn.onclick = () => speak(d[1], "ja-JP");
    }

    a.onclick = () => a.classList.toggle("show");

    item.appendChild(q);
    item.appendChild(a);
    item.appendChild(speakBtn);

    quiz.appendChild(item);
  });
}

function toggleMode() {
  mode = mode === "enToJp" ? "jpToEn" : "enToJp";
  render();
}

function shuffle() {
  data.sort(() => Math.random() - 0.5);
  render();
}

function resetOrder() {
  data = [...originalData];
  render();
}

function speak(text, lang) {
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = lang;
  speechSynthesis.speak(uttr);
}

render();
</script>

</body>
</html>

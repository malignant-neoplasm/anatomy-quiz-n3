<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Anatomy Quiz (Organs)</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f7f7f7;
}

/* ===== 上部コントロール ===== */
.controls {
  position: sticky;
  top: 0;
  background: #ffffff;
  padding: 10px;
  display: flex;
  gap: 10px;
  justify-content: center;
  border-bottom: 1px solid #ddd;
  z-index: 10;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #1976d2;
  color: white;
  cursor: pointer;
  font-size: 0.85em;
}
button:hover {
  background: #1565c0;
}

/* ===== クイズ本体 ===== */
.quiz {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
}

.item {
  width: calc(50% - 5px);
  background: #fffafa;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 10px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 問題文 */
.q {
  font-weight: bold;
  font-size: 0.85em;
  flex: 1;
}

/* 黒枠（ここが超重要） */
.a {
  width: 220px;              /* ←固定で揃える */
  text-align: center;
  background: #444;
  color: #444;
  border-radius: 4px;
  padding: 6px 0;
  cursor: pointer;
  transition: 0.2s;
  font-size: 0.8em;
  margin-left: 10px;
  white-space: nowrap;
  overflow: hidden;
}

.a.show {
  background: #fff9c4;
  color: #d32f2f;
}

/* スマホ */
@media (max-width: 600px) {
  .item {
    width: 100%;
  }
  .a {
    width: 180px;
  }
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="toggleMode()">日⇄英 切替</button>
  <button onclick="shuffle()">シャッフル</button>
  <button onclick="speakAll()">読み上げ</button>
</div>

<div id="quiz" class="quiz"></div>

<script>
let mode = "enToJp";

const data = [
["brain / encephalon","脳"],
["cerebrum","大脳"],
["cerebellum","小脳"],
["brainstem","脳幹"],
["midbrain / mesencephalon","中脳"],
["pons","橋"],
["medulla oblongata","延髄"],
["diencephalon","間脳"],
["thalamus","視床"],
["hypothalamus","視床下部"],
["pineal gland","松果体"],
["pituitary gland","下垂体"],
["hippocampus","海馬"],
["spinal cord","脊髄"],
["meninx (pl. meninges)","髄膜"],

["eyeball","眼球"],
["conjunctiva","結膜"],
["cornea","角膜"],
["iris","虹彩"],
["crystalline lens","水晶体"],
["retina","網膜"],
["vitreous body","硝子体"],
["uvea","ぶどう膜"],
["sclera","強膜"],

["auricle","耳介"],
["external ear","外耳"],
["middle ear","中耳"],
["internal ear","内耳"],
["external auditory canal","外耳道"],
["eardrum / tympanic membrane","鼓膜"],
["Eustachian tube","耳管"],

["cochlea","蝸牛"],
["semicircular canals","半規管"],

["heart","心臓"],
["left atrium","左心房"],
["left ventricle","左心室"],
["right atrium","右心房"],
["right ventricle","右心室"],
["tricuspid valve","三尖弁"],
["mitral valve","僧帽弁"],
["aortic valve","大動脈弁"],
["aortic arch","大動脈弓"],
["aorta","大動脈"],
["pulmonary artery","肺動脈"],
["pulmonary vein","肺静脈"],
["coronary artery","冠動脈"],
["superior vena cava","上大静脈"],
["inferior vena cava","下大静脈"]
];

function render() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  data.forEach(d => {
    const item = document.createElement("div");
    item.className = "item";

    const q = document.createElement("div");
    q.className = "q";

    const a = document.createElement("div");
    a.className = "a";

    if (mode === "enToJp") {
      q.textContent = d[0];
      a.textContent = d[1];
    } else {
      q.textContent = d[1];
      a.textContent = d[0];
    }

    a.onclick = () => a.classList.toggle("show");

    item.appendChild(q);
    item.appendChild(a);
    quiz.appendChild(item);
  });
}

function toggleMode() {
  mode = mode === "enToJp" ? "jpToEn" : "enToJp";
  render();
}

function shuffle() {
  data.sort(() => Math.random() - 0.5);
  render();
}

function speakAll() {
  data.forEach(d => {
    const text = mode === "enToJp" ? d[0] : d[1];
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = mode === "enToJp" ? "en-US" : "ja-JP";
    speechSynthesis.speak(uttr);
  });
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy Quiz</title>

<style>
body {
  font-family: sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 10px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #d32f2f;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  width: calc(50% - 5px);
  background: white;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.word {
  font-weight: bold;
  font-size: 0.9em;
}

.mask {
  background: #444;
  color: #444;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  min-width: 120px;
  text-align: center;
}

.mask.show {
  background: #fff9c4;
  color: #d32f2f;
}

.speak {
  margin-left: 5px;
  cursor: pointer;
}

@media (max-width: 650px) {
  .card { width: 100%; }
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="toggleMode()">日⇄英 切替</button>
  <button onclick="shuffle()">シャッフル</button>
</div>

<div class="container" id="container"></div>

<script>
let mode = "enToJp";

let data = [
["brain / encephalon","脳"],
["cerebrum","大脳"],
["cerebellum","小脳"],
["brainstem","脳幹"],
["midbrain / mesencephalon","中脳"],
["pons","橋"],
["medulla oblongata","延髄"],
["diencephalon","間脳"],
["thalamus","視床"],
["hypothalamus","視床下部"],
["pineal gland","松果体"],
["pituitary gland","下垂体"],
["hippocampus","海馬"],
["spinal cord","脊髄"],
["meninx (pl. meninges)","髄膜"],

["eyeball","眼球"],
["conjunctiva","結膜"],
["cornea","角膜"],
["iris","虹彩"],
["crystalline lens","水晶体"],
["retina","網膜"],
["vitreous body","硝子体"],
["uvea","ぶどう膜"],
["sclera","強膜"],

["auricle","耳介"],
["external ear","外耳"],
["middle ear","中耳"],
["internal ear","内耳"],
["external auditory canal","外耳道"],
["eardrum / tympanic membrane","鼓膜"],
["Eustachian tube","耳管"],

["cochlea","蝸牛"],
["semicircular canals","半規管"],

["heart","心臓"],
["left atrium","左心房"],
["left ventricle","左心室"],
["right atrium","右心房"],
["right ventricle","右心室"],
["tricuspid valve","三尖弁"],
["mitral valve","僧帽弁"],
["aortic valve","大動脈弁"],
["aortic arch","大動脈弓"],
["aorta","大動脈"],
["pulmonary artery","肺動脈"],
["pulmonary vein","肺静脈"],
["coronary artery","冠動脈"],
["superior vena cava","上大静脈"],
["inferior vena cava","下大静脈"]
];

function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(([en, jp]) => {
    let q = mode === "enToJp" ? en : jp;
    let a = mode === "enToJp" ? jp : en;

    const card = document.createElement("div");
    card.className = "card";

    const word = document.createElement("div");
    word.className = "word";
    word.innerText = q;

    const mask = document.createElement("div");
    mask.className = "mask";
    mask.innerText = a;

    mask.onclick = () => {
      mask.classList.toggle("show");
    };

    const speak = document.createElement("span");
    speak.className = "speak";
    speak.innerText = "🔊";
    speak.onclick = () => speakWord(q);

    const right = document.createElement("div");
    right.appendChild(mask);
    right.appendChild(speak);

    card.appendChild(word);
    card.appendChild(right);

    container.appendChild(card);
  });
}

function toggleMode() {
  mode = mode === "enToJp" ? "jpToEn" : "enToJp";
  render();
}

function shuffle() {
  data.sort(() => Math.random() - 0.5);
  render();
}

function speakWord(text) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  speechSynthesis.speak(utter);
}

render();
</script>

</body>
</html>
